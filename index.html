<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GPA Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>GPA Calculator</h2>

<div class="box">
<input type="text" id="student" placeholder="Student Name">
<input type="text" id="semester" placeholder="Semester">

<h3>Courses</h3>

<div class="row">
<input type="text" placeholder="Course" class="course">
<input type="number" placeholder="Credits" class="credits" step="0.5">
<input type="number" placeholder="Grade" class="grade" step="0.01">
</div>

<div class="row">
<input type="text" placeholder="Course" class="course">
<input type="number" placeholder="Credits" class="credits" step="0.5">
<input type="number" placeholder="Grade" class="grade" step="0.01">
</div>

<div class="row">
<input type="text" placeholder="Course" class="course">
<input type="number" placeholder="Credits" class="credits" step="0.5">
<input type="number" placeholder="Grade" class="grade" step="0.01">
</div>

<button onclick="calculateGPA()">Calculate GPA</button>

</div>

<div id="result"></div>

<script src="script.js"></script>
</body>
</html>
